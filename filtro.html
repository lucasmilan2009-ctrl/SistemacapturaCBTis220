<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Filtro de Asistencias - CBTis 220</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f4f8fb;
    }
    h1 {
      color: #000000;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #ca0808;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
    /* 🔴 Botón de salida */
    .btn-salir {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background-color: #C8102E; /* rojo institucional */
      color: white;
      padding: 10px 18px;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    }
    .btn-salir:hover {
      background-color: #A00B20; /* tono más oscuro al pasar el mouse */
    }
  </style>
</head>
<body>
  <h1>Asistencias CBTis 220</h1>

  <!-- Filtro de registros -->
  <input type="text" id="filtro" placeholder="Buscar alumno por nombre o número de control">

  <!-- Tabla de asistencias -->
  <table id="tablaAsistencias">
    <tr>
      <th>Nombre</th>
      <th>Número de Control</th>
      <th>Asistencia</th>
    </tr>
    <!-- Aquí se llenarán las filas dinámicamente -->
  </table>

  <!-- Botón de salida -->
  <a href="index.html" class="btn-salir">inicio</a>

  <script>
    // Filtro dinámico local
    document.getElementById("filtro").addEventListener("keyup", function() {
      let filtro = this.value.toLowerCase();
      let filas = document.querySelectorAll("#tablaAsistencias tr");
      filas.forEach((fila, index) => {
        if (index === 0) return; // saltar encabezado
        let texto = fila.textContent.toLowerCase();
        fila.style.display = texto.includes(filtro) ? "" : "none";
      });
    });
  </script>
</body>
</html>
