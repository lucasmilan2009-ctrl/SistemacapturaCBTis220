<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Captura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Sistema de Captura</h1>
    <h2>Captura asistencias, reportes e incidentes de enfermería </h2>
   <div class="menu">
    <br>
    <nav>
        <ul>
            <li><a href="inicio.html">Inicio</a></li>
            <li><a href="asistencias.html"> Registro de Asistencia</li></a>
            <li><a href="reportes.html">Reportes</li></a>
            <li><a href="justificantes.html">Justificantes</li></a>
            <li><a href="enfermeria.html">Incidentes de enfermeria</a></li>
        </ul>
    </nav></div></header>
    <div class="caja">
    <form>
      <h2 class="reporte-titulo">Formulario de Justificantes</h2>

      <label for="nombre">Nombre del alumno:</label>
      <input type="text" id="nombre" name="nombre" required>
      <div>
          <label for="NumControl">Número de control:</label>
          <input type="text" id="NumControl" name="NumControl">
        </div>
      <label for="grupo">Grupo:</label>
      <input type="text" id="grupo" name="grupo" required>

      <label for="fecha">Fecha de la falta:</label>
      <input type="date" id="fecha" name="fecha" required>

      <label for="motivo">Motivo del justificante:</label>
      <textarea id="motivo" name="motivo" rows="4" required></textarea>

      <div class="checkbox-group">
        <label><input type="checkbox" name="tipo" value="inasistencia"> Inasistencia</label>
        <label><input type="checkbox" name="tipo" value="retardo"> Retardo</label>
      </div>

      <div class="signature-section">
        <div>
          <label for="firmaAlumno">Nombre del Alumno:</label>
          <input type="text" id="firmaAlumno" name="firmaAlumno" placeholder="Escribe el nombre del alumno">
        </div>
        <div>
          <label for="firmaPadre">Nombre del Padre/Tutor:</label>
          <input type="text" id="firmaPadre" name="firmaPadre" placeholder="Escribe el nombre del padre/tutor">
        </div>
        <div>
          <label for="firmaDocente">Nombre del Docente:</label>
          <input type="text" id="firmaDocente" name="firmaDocente" placeholder="Escribe el nombre del docente">
        </div>
      </div>

      <button type="submit">Registrar Justificante</button>
    </form>
  </div>
</body>
</html>
