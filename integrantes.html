<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integrantes del Proyecto</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      background: #e6f2ff; /* celeste claro institucional en TODO el fondo */
    }

    /* Barra azul institucional */
    .barra-titulo {
      background: #ca0808; /* azul fuerte CBTis */
      padding: 20px;
      text-align: center;
    }
    .barra-titulo h2 {
      color: #ffffff; /* letras blancas */
      font-size: 28px; /* más grandes */
      margin: 0;
    }

    .contenedor-integrantes {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      padding: 30px;
    }

    .card-integrante {
      background: #ffffff; /* fondo blanco de las cards */
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      width: 280px;
      text-align: center;
      padding: 20px;
      border: 3px solid #000000; /* contorno azul institucional */
      transition: transform 0.3s;
    }

    .card-integrante:hover {
      transform: translateY(-6px);
    }

    .card-integrante img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 6px;
      border: 2px solid #000000;
      margin-bottom: 15px;
    }

    .card-integrante h3 {
      margin: 10px 0 5px;
      font-size: 18px;
      color: #000000;
    }

    .card-integrante p {
      font-size: 14px;
      margin: 0;
      color: #333;
    }

    /* Botón rojo fijo en esquina inferior izquierda */
    .btn-salir {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #C8102E; /* rojo institucional */
      color: white;
      padding: 10px 18px;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
    }
    .btn-salir:hover {
      background: #a00;
    }
  </style>
</head>
<body>

  <!-- Barra azul con título -->
  <div class="barra-titulo">
    <h2>Integrantes del Proyecto</h2>
  </div>

  <div class="contenedor-integrantes">
    <!-- Card de Lucas -->
    <div class="card-integrante">
      <img src="lucas.jpg" alt="Foto de Lucas Santiago Milan Martínez">
      <h3>Lucas Santiago Milan Martínez</h3>
      <p>Desarrollador</p>
    </div>

    <!-- Card de Daniela -->
    <div class="card-integrante">
      <img src="daniela.jpg" alt="Foto de Daniela Michelle Venegaz Perales">
      <h3>Daniela Michelle Venegaz Perales</h3>
      <p>Desarrolladora / Scrum Master</p>
    </div>
  </div>

  <!-- Botón rojo de salir fijo -->
  <a href="index.html" class="btn-salir">inicio</a>

</body>
</html>
