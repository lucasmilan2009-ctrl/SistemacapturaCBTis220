<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incidente Médico - CBTis 220<h2 class="titulo-incidente">Registrar Incidente Médico</h2></title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background-color: #e6f2fa; }
    header {
      background-color: #ca0808; color: #ffffff; padding: 20px; text-align: center;
    }
    section { padding: 20px; max-width: 850px; margin: auto; }
    form {
      background: #ffffff; padding: 25px; border-radius: 12px;
      margin-top: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); border: 2px solid #003366;
    }
    input, select, textarea, button {
      margin: 10px 0; padding: 12px; width: 100%; border-radius: 6px; border: 1px solid #6E6E6E;
    }
    textarea { min-height: 80px; resize: none; }
    button { background: #ca0808; color: rgb(0, 0, 0); border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #C8102E; }
    h2 {
      color: #000000; 
      text-align: center; 
      margin-bottom: 20px; 
      border-bottom: 2px solid #ffffff;
      padding-bottom: 10px;
    }
    .btn-inicio {
      position: fixed; bottom: 20px; left: 20px;
      background: #C8102E; color: white; padding: 10px 16px;
      border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none;
    }
    .btn-inicio:hover { background: #6E6E6E; }
  </style>
</head>
<body>
  <style>.watermark {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 150px; 
  opacity: 2.05; 
  pointer-events: none; 
  z-index: 9999; 
  }</style>
  <img src="logo.cbtis.png" class="watermark" alt="Marca de agua">
  <header>
    <h1>Incidente Médico</h1>
  </header>

  <section>
    <form id="formIncidente">
      <!-- Encabezado azul dentro de la hoja -->
      <h2>Registrar Incidente Médico</h2>
      
      <input type="text" id="nombreAlumno" placeholder="Nombre completo del alumno" required>
      <input type="text" id="numControl" placeholder="Número de control" required>
      <input type="text" id="grupo" placeholder="Grupo" required>
      <input type="date" id="fechaIncidente" required>
      <input type="time" id="horaIncidente" required>
      <select id="tipoIncidente" required>
        <option value="">-- Tipo de incidente --</option>
        <option value="Accidente">Accidente</option>
        <option value="Enfermedad">Enfermedad</option>
        <option value="Otro">Otro</option>
      </select>
      <textarea id="descripcion" placeholder="Descripción breve del incidente" required></textarea>
      <input type="text" id="responsable" placeholder="Responsable que atendió">
      <button type="submit">Registrar incidente</button>
    </form>
  </section>

  <!-- Botón de inicio abajo en la esquina izquierda, fuera de la hoja -->
  <a href="index.html" class="btn-inicio"> Inicio</a>
<script src="clave.js"></script>
<script>
  // Activa la protección al cargar la página
  document.addEventListener("DOMContentLoaded", function() {
    iniciarProteccion("CBTis220"); // puedes cambiar la clave aquí
  });
</script>
  <script>
    // Captura del formulario (sin mostrar registros en pantalla)
    document.getElementById("formIncidente").addEventListener("submit", function(e) {
      e.preventDefault();
      let datos = {
        nombre: document.getElementById("nombreAlumno").value,
        control: document.getElementById("numControl").value,
        grupo: document.getElementById("grupo").value,
        fecha: document.getElementById("fechaIncidente").value,
        hora: document.getElementById("horaIncidente").value,
        tipo: document.getElementById("tipoIncidente").value,
        descripcion: document.getElementById("descripcion").value,
        responsable: document.getElementById("responsable").value
      };

      console.log("Incidente guardado:", datos);
      this.reset();
    });
  </script>
</body>
</html>
